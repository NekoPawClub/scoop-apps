name: AutoMirror

on:
  # 每天凌晨 0 点 UTC 触发 (对应北京时间 08:00)
  schedule:
    - cron: '0 0 * * *'
  # 支持手动触发
  workflow_dispatch:

jobs:
  automirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许推送提交

    steps:
      - name: 📂 检出仓库代码
        uses: actions/checkout@v4
        with:
          ref: mirror
          lfs: true  # 启用 Git LFS 检出

      - name: ⚙️ 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 🚀 运行自动化脚本
        run: node automirror.mjs

      - name: 📝 配置 Git LFS 并跟踪大文件
        run: |
          # 初始化 Git LFS
          git lfs install --local

          # 跟踪 packages 目录下的所有文件
          git lfs track "packages/*.*"

          # 提交 .gitattributes 文件
          if [ -f .gitattributes ]; then
            git add .gitattributes
          fi

      - name: 📝 检查并提交更改
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 配置 Git 提交者信息
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub_Actions"

          # 处理 commit.txt
          if [ -f commit.txt ]; then
            COMMIT_MSG=$(cat commit.txt)
            rm commit.txt

            # 添加所有更改 (包括 LFS 指针文件)
            git add .

            # 提交更改
            git commit -m "$COMMIT_MSG"

            # 推送提交到 mirror 分支
            git push origin mirror
          else
            echo "未找到 commit.txt 跳过提交"
          fi