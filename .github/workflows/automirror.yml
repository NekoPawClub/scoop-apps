name: Automirror Workflow

on:
  # 每天凌晨 0 点 UTC 触发 (对应北京时间 08:00)
  schedule:
    - cron: '0 0 * * *'
  # 支持手动触发
  workflow_dispatch:

jobs:
  automirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许推送提交

    steps:
      - name: 📂 检出仓库代码
        uses: actions/checkout@v4
        with:
          ref: mirror  # 显式指定分支

      - name: ⚙️ 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 24  # 根据需要修改 Node.js 版本

      - name: 🔧 安装依赖 (如需)
        run: npm install  # 如果脚本无依赖可删除此步骤

      - name: 🚀 运行自动化脚本
        run: node automirror.mjs

      - name: 📝 检查并提交更改
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 配置 Git 提交者信息
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub_Actions"

          # 处理 commit.txt
          if [ -f commit.txt ]; then
            COMMIT_MSG=$(cat commit.txt)
            rm commit.txt
            git add .
            git commit -m "$COMMIT_MSG"
            
            # 推送提交到 mirror 分支
            git push origin mirror
          else
            echo "未找到 commit.txt，跳过提交"
          fi